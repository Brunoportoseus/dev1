<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Cmarceneiro · Banner Fechaduras 1200×675</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#222;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Montserrat',sans-serif;}

  /* ── BANNER STAGE — exact 1200×675 ── */
  .banner{
    position:relative;width:1200px;height:675px;overflow:hidden;
    text-decoration:none;display:block;background:#1c1712;
    font-family:'Montserrat',sans-serif;
  }
  .banner svg.bg{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* darkening toward the right so the copy stays readable (mirrors reference) */
  .banner::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(100deg,
      rgba(20,16,11,0)   0%,
      rgba(20,16,11,0)   34%,
      rgba(22,17,11,.55) 50%,
      rgba(20,15,10,.86) 70%,
      rgba(17,13,9,.93)  100%);
  }

  .content{
    position:absolute;top:0;right:0;height:100%;
    width:660px;padding:0 64px;
    display:flex;flex-direction:column;align-items:flex-end;justify-content:center;
    text-align:right;z-index:2;
  }
  .headline{
    font-family:'Cormorant Garamond',serif;
    font-weight:400;color:#f6f3ee;
    font-size:62px;line-height:1.04;letter-spacing:.005em;
    text-shadow:0 2px 18px rgba(0,0,0,.45);
  }
  .subtitle{
    margin-top:26px;max-width:430px;
    font-weight:300;color:#dcd6cc;
    font-size:19px;line-height:1.65;letter-spacing:.015em;
    text-shadow:0 1px 10px rgba(0,0,0,.5);
  }
  .cta{
    margin-top:42px;display:inline-flex;align-items:center;gap:14px;
    background:linear-gradient(135deg,#c9803f 0%,#b56b30 55%,#9c5722 100%);
    color:#fff;font-weight:700;font-size:15px;
    letter-spacing:.13em;text-transform:uppercase;
    padding:17px 34px;border-radius:3px;
    box-shadow:0 10px 26px rgba(120,70,25,.42);
  }
  .cta svg{width:13px;height:13px;fill:#fff;flex-shrink:0;}
</style>
</head>
<body>

<a class="banner" href="https://www.cmarceneiro.com.br/departamento/fechaduras"
   target="_blank" rel="noopener" aria-label="Ver departamento de Fechaduras e Acessórios">

  <!-- ░░ FUNDO: porta de madeira com fechadura (ilustração no estilo da marca) ░░ -->
  <svg class="bg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <defs>
      <linearGradient id="room" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#2a221a"/><stop offset="55%" stop-color="#211a13"/><stop offset="100%" stop-color="#15110c"/>
      </linearGradient>
      <linearGradient id="doorWood" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#7a4f2c"/><stop offset="38%" stop-color="#9a6638"/>
        <stop offset="64%" stop-color="#7c4e29"/><stop offset="100%" stop-color="#5c3a20"/>
      </linearGradient>
      <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#8a5a32"/><stop offset="50%" stop-color="#6f4626"/><stop offset="100%" stop-color="#54341c"/>
      </linearGradient>
      <linearGradient id="bevel" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#b07d49"/><stop offset="100%" stop-color="#4a2e18"/>
      </linearGradient>
      <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f3e0ad"/><stop offset="42%" stop-color="#d3ab63"/>
        <stop offset="72%" stop-color="#a9823c"/><stop offset="100%" stop-color="#7c5e27"/>
      </linearGradient>
      <linearGradient id="brassRim" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#fff0cf"/><stop offset="50%" stop-color="#caa056"/><stop offset="100%" stop-color="#6f521f"/>
      </linearGradient>
      <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff"/><stop offset="45%" stop-color="#cfcfcf"/>
        <stop offset="72%" stop-color="#8f8f8f"/><stop offset="100%" stop-color="#dcdcdc"/>
      </linearGradient>
      <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
        <stop offset="0" stop-color="#ffe2a8" stop-opacity=".30"/><stop offset="1" stop-color="#ffe2a8" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="shineV" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fff" stop-opacity=".5"/><stop offset="1" stop-color="#fff" stop-opacity="0"/>
      </linearGradient>
      <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="7" stdDeviation="11" flood-color="#000" flood-opacity="0.42"/>
      </filter>
    </defs>

    <!-- ambiente -->
    <rect width="1200" height="675" fill="url(#room)"/>
    <ellipse cx="360" cy="338" rx="430" ry="430" fill="url(#glow)"/>

    <!-- batente / moldura da porta -->
    <rect x="40" y="-20" width="690" height="715" fill="#3a2818"/>
    <rect x="64" y="-20" width="642" height="715" fill="#22180f"/>

    <!-- folha da porta -->
    <g filter="url(#soft)">
      <rect x="92" y="-20" width="586" height="715" fill="url(#doorWood)"/>

      <!-- painel superior -->
      <rect x="150" y="58" width="470" height="232" rx="6" fill="url(#bevel)"/>
      <rect x="166" y="74" width="438" height="200" rx="4" fill="url(#panel)"/>
      <!-- painel inferior -->
      <rect x="150" y="330" width="470" height="318" rx="6" fill="url(#bevel)"/>
      <rect x="166" y="346" width="438" height="286" rx="4" fill="url(#panel)"/>

      <!-- veios sutis da madeira -->
      <g stroke="#5a3a20" stroke-width="2" opacity=".32" fill="none">
        <path d="M120 0 Q132 340 120 695"/><path d="M648 0 Q636 340 648 695"/>
      </g>
      <!-- realce de luz na lateral esquerda da folha -->
      <rect x="92" y="-20" width="14" height="715" fill="url(#shineV)" opacity=".6"/>
    </g>

    <!-- ░ CONJUNTO DA FECHADURA ░ -->
    <g filter="url(#soft)" transform="translate(596 300)">
      <!-- espelho/escudo -->
      <rect x="-34" y="-150" width="68" height="300" rx="34" fill="url(#brass)"/>
      <rect x="-34" y="-150" width="20" height="300" rx="14" fill="url(#shineV)" opacity=".55"/>
      <rect x="-34" y="-150" width="68" height="300" rx="34" fill="none" stroke="url(#brassRim)" stroke-width="3"/>

      <!-- cilindro / trava superior -->
      <circle cx="0" cy="-96" r="26" fill="url(#brass)"/>
      <circle cx="0" cy="-96" r="26" fill="none" stroke="url(#brassRim)" stroke-width="3"/>
      <circle cx="0" cy="-96" r="9" fill="#3a2c12"/>
      <rect x="-3.5" y="-101" width="7" height="14" rx="3" fill="#caa056"/>

      <!-- buraco da chave -->
      <circle cx="0" cy="34" r="13" fill="#2c2110"/>
      <path d="M-5 38 L5 38 L9 70 L-9 70 Z" fill="#2c2110"/>
      <circle cx="0" cy="34" r="13" fill="none" stroke="url(#brassRim)" stroke-width="2.5"/>

      <!-- maçaneta tipo alavanca -->
      <circle cx="0" cy="-18" r="40" fill="url(#brass)"/>
      <circle cx="0" cy="-18" r="40" fill="none" stroke="url(#brassRim)" stroke-width="3"/>
      <circle cx="0" cy="-18" r="40" fill="url(#shineV)" opacity=".4"/>
      <path d="M-6 -34 Q-12 -18 -10 0 L-150 26 Q-176 30 -176 8 Q-176 -14 -150 -16 L-6 -34 Z"
            fill="url(#brass)"/>
      <path d="M-150 26 Q-176 30 -176 8 Q-176 -14 -150 -16 L-150 26 Z" fill="url(#brassRim)"/>
      <path d="M-12 -30 L-150 -10" stroke="url(#shineV)" stroke-width="6" stroke-linecap="round" opacity=".75"/>
      <circle cx="0" cy="-18" r="11" fill="url(#steel)"/>
    </g>

    <!-- piso / rodapé sutil -->
    <rect x="0" y="640" width="730" height="35" fill="#100c08" opacity=".7"/>
  </svg>

  <!-- ░░ TEXTO + BOTÃO (mesma localização do layout de referência) ░░ -->
  <div class="content">
    <h1 class="headline">Tudo para suas<br/>fechaduras em<br/>um só lugar</h1>
    <p class="subtitle">Segurança, durabilidade e acabamentos que unem proteção e sofisticação no dia a dia</p>
    <span class="cta">
      Ver Departamento
      <svg viewBox="0 0 24 24"><path d="M8 5l8 7-8 7z"/></svg>
    </span>
  </div>

</a>

</body>
</html>
